# Reusable ontology-CI gate for CONSUMER projects (not this repo's own build — that is ci.yml).
#
# What it gates:
#   * CANDIDATE POLICY VALIDATION — the PR policy is validated as a proposed change, but never judges
#     the ontology change in the same PR.
#   * TRUSTED FULL PROJECT QC — the base branch's policy, validation assets, imports, and catalog judge
#     the candidate root ontology with HermiT, offline, producing JSON/JUnit/SARIF evidence.
#   * RELEASE PREVIEW — the same trusted workspace runs the complete dry-run release gate and records
#     every artifact checksum (enabled by default).
#   * ASSERTED SEMANTIC DIFF — `diff --left <baseline> --right <ontology> --no-network`: the
#     asserted-only semantic change between the base-branch ontology and the PR's ontology
#     (imports are never dereferenced; a private empty placeholder satisfies each one).
#
# Fork-safe by construction: this workflow is the UNTRUSTED half. A consumer calls it
# from a `pull_request`-triggered caller (never `pull_request_target`), so a fork PR runs it with a
# read-only token and no secrets. It grants only `contents: read`, holds no PR-write or
# security-events scope, and writes its verdict ONLY to an uploaded artifact. The TRUSTED half
# (ontology-annotate.yml, run from the consumer's default branch via `workflow_run`) reads that
# artifact as data and posts the annotation. The gate flags here are fixed (`--no-network`,
# `--no-external`, no credentials), so a PR policy cannot relax the parser posture.
#
# Requires protege-mcp-cli 0.7.1+ (the first release with complete headless QC/release execution).
# Tags in hakjuoh/protege-mcp are occasionally re-cut (moved), so `cli_version`
# pins a release and consumers should pin THIS workflow itself by full commit SHA (see docs/ci.md).

name: Ontology CI (reusable)

on:
  workflow_call:
    inputs:
      project:
        description: 'Path to the project policy (.protege-mcp/project.yaml).'
        type: string
        default: '.protege-mcp/project.yaml'
      ontology:
        description: 'Path to the candidate root ontology; must match the trusted policy root artifact.'
        type: string
        required: true
      diff_check:
        description: >-
          Turn the asserted diff into an identity gate (`diff --check`, exit 1 on ANY difference).
          Leave false for a PR that intentionally edits the ontology; enable it only for a
          reproducibility / no-drift check where the two inputs are expected to be identical.
        type: boolean
        default: false
      cli_version:
        description: 'protege-mcp-cli release to download (0.7.1+). Pin to a release you reviewed.'
        type: string
        default: '0.7.2'
      release_check:
        description: 'Run and enforce the trusted dry-run release gate and preserve its checksums.'
        type: boolean
        default: true
      artifact_name:
        description: 'Name of the results artifact the trusted annotator consumes.'
        type: string
        default: 'ontology-ci-results'

# Least privilege: the untrusted validation job only needs to read the repository. It never gets
# pull-requests: write or security-events: write — those live solely in the trusted annotator.
permissions:
  contents: read

jobs:
  validate:
    # Fixed hosted runner: workflow_call inputs come from the PR-side caller workflow and therefore
    # must never be allowed to route untrusted work onto a consumer's self-hosted runner.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require a pull-request caller
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "::error::This reusable workflow must be called by a pull_request workflow."
            exit 2
          fi

      # Pin the exact PR-head SHA recorded in the artifact. Treat the checkout as untrusted data only.
      - name: Check out the candidate (PR head)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: __candidate__

      # The BASE branch establishes the diff baseline, so the PR cannot rewrite what it is compared
      # against. base.sha is an immutable commit id (safe to pass as a checkout ref input).
      - name: Check out the base-branch baseline
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: __baseline__

      - name: Set up Temurin JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '17'
          distribution: temurin

      # workflow_call values are selected by the PR-side caller workflow, so paths are untrusted even
      # though this reusable workflow is SHA-pinned. Resolve every input below its checkout before a
      # parser sees it; this also rejects a repository symlink that points at runner files.
      - name: Confine untrusted workflow inputs to their checkouts
        id: paths
        env:
          PROJECT: ${{ inputs.project }}
          ONTOLOGY: ${{ inputs.ontology }}
          CANDIDATE: ${{ github.workspace }}/__candidate__
          BASELINE: ${{ github.workspace }}/__baseline__
        run: |
          confine_file() {
            root="$1"
            relative="$2"
            label="$3"
            if [ "${#relative}" -gt 512 ] || printf '%s' "$relative" | grep -q '[[:cntrl:]]'; then
              echo "::error::${label} is oversized or contains control characters."
              exit 2
            fi
            case "$relative" in
              ''|/*|\\\\*|[A-Za-z]:*)
                echo "::error::${label} must be a non-empty checkout-relative path."
                exit 2
                ;;
            esac
            root_real="$(realpath -e -- "$root")"
            resolved="$(realpath -e -- "$root/$relative")" || {
              echo "::error::${label} does not resolve to an existing file inside its checkout."
              exit 2
            }
            case "$resolved" in
              "$root_real"/*) ;;
              *) echo "::error::${label} escapes its checkout."; exit 2 ;;
            esac
            if [ ! -f "$resolved" ]; then
              echo "::error::${label} is not a regular file."
              exit 2
            fi
          }
          confine_file "$CANDIDATE" "$PROJECT" candidate-project
          confine_file "$BASELINE" "$PROJECT" trusted-base-project
          confine_file "$CANDIDATE" "$ONTOLOGY" candidate-ontology
          if [ -e "$BASELINE/$ONTOLOGY" ]; then
            confine_file "$BASELINE" "$ONTOLOGY" baseline-ontology
          fi
          candidate_root="$(realpath -e -- "$CANDIDATE")"
          candidate_ontology="$(realpath -e -- "$CANDIDATE/$ONTOLOGY")"
          ontology_relative="$(realpath --relative-to="$candidate_root" -- "$candidate_ontology")"
          case "$ontology_relative" in ''|..|../*) exit 2 ;; esac
          echo "ontology_relative=$ontology_relative" >> "$GITHUB_OUTPUT"

      # Download the published CLI and VERIFY it before running anything. The release publishes a
      # bare-basename `.sha256` sidecar, so `sha256sum -c` verifies the jar in the working directory.
      # --retry-all-errors rides the brief 404 window a release re-cut opens (delete+recreate).
      - name: Download and verify the protege-mcp CLI
        id: cli
        env:
          CLI_VERSION: ${{ inputs.cli_version }}
        run: |
          if ! printf '%s' "$CLI_VERSION" \
              | grep -Eq '^(0|[1-9][0-9]{0,8})\.(0|[1-9][0-9]{0,8})\.(0|[1-9][0-9]{0,8})$'; then
            echo "::error::cli_version must be a canonical numeric SemVer release (for example 0.7.1)."
            exit 2
          fi
          IFS=. read -r major minor patch <<< "$CLI_VERSION"
          if (( major < 0 || (major == 0 && minor < 7) \
              || (major == 0 && minor == 7 && patch < 1) )); then
            echo "::error::cli_version must be 0.7.1 or newer."
            exit 2
          fi
          base="https://github.com/hakjuoh/protege-mcp/releases/download/v${CLI_VERSION}"
          jar="protege-mcp-cli-${CLI_VERSION}-all.jar"
          curl --fail --location --retry 3 --retry-all-errors --max-time 180 -o "$jar" "${base}/${jar}"
          curl --fail --location --retry 3 --retry-all-errors --max-time 60 -o "${jar}.sha256" "${base}/${jar}.sha256"
          sha256sum -c "${jar}.sha256"
          java -jar "$jar" --version
          mv "$jar" "${jar}.sha256" "$RUNNER_TEMP/"
          echo "jar=${RUNNER_TEMP}/${jar}" >> "$GITHUB_OUTPUT"

      # Build the trusted judge from BASE bytes, then replace only the configured root ontology with
      # candidate bytes. Candidate policy/shapes/queries/catalogs are therefore never able to weaken
      # the gate judging the same PR.
      - name: Build trusted candidate workspace
        id: trusted
        env:
          BASELINE: ${{ github.workspace }}/__baseline__
          CANDIDATE: ${{ github.workspace }}/__candidate__
          PROJECT_INPUT: ${{ inputs.project }}
          ONTOLOGY_INPUT: ${{ inputs.ontology }}
          ONTOLOGY_RELATIVE: ${{ steps.paths.outputs.ontology_relative }}
          TRUSTED: ${{ runner.temp }}/trusted-project
        run: |
          rm -rf "$TRUSTED"
          mkdir -m 700 "$TRUSTED"
          cp -a -- "$BASELINE/." "$TRUSTED/"
          # Checkout metadata is not a project input and can expose unrelated repository internals to
          # parsers or unnecessarily inflate the private copy. The immutable base SHA is already bound
          # in meta.json and independently authenticated by the annotator.
          rm -rf -- "$TRUSTED/.git"
          trusted_real="$(realpath -e -- "$TRUSTED")"
          candidate_ontology="$(realpath -e -- "$CANDIDATE/$ONTOLOGY_INPUT")"
          destination="$TRUSTED/$ONTOLOGY_RELATIVE"
          parent="$(realpath -e -- "$(dirname -- "$destination")")" || {
            echo "::error::The candidate ontology parent does not exist in the trusted base workspace."
            exit 2
          }
          case "$parent" in "$trusted_real"|"$trusted_real"/*) ;; *)
            echo "::error::Trusted ontology destination escapes the workspace."; exit 2;; esac
          if [ -d "$destination" ]; then
            echo "::error::Trusted ontology destination is a directory."; exit 2
          fi
          rm -f -- "$destination"
          install -m 600 -- "$candidate_ontology" "$destination"
          trusted_project="$(realpath -e -- "$TRUSTED/$PROJECT_INPUT")"
          case "$trusted_project" in "$trusted_real"/*) ;; *)
            echo "::error::Trusted project policy escapes the workspace."; exit 2;; esac
          echo "project=$trusted_project" >> "$GITHUB_OUTPUT"
          echo "ontology_relative=$ONTOLOGY_RELATIVE" >> "$GITHUB_OUTPUT"

      # Validate the PR policy only as a proposal. It does not supply the policy or validation assets
      # used by the trusted full-QC/release steps below.
      - name: Validate candidate project policy
        id: policy
        env:
          JAR: ${{ steps.cli.outputs.jar }}
          PROJECT: ${{ github.workspace }}/__candidate__/${{ inputs.project }}
          RESULTS: ${{ runner.temp }}/results
        run: |
          # Results live in a FRESH directory OUTSIDE the fork checkout ($RUNNER_TEMP), so a PR that
          # commits tracked files under results/ can never mix into the artifact the trusted job reads.
          rm -rf "$RESULTS"
          mkdir -p "$RESULTS"
          set +e
          java -jar "$JAR" validate-policy --project "$PROJECT" --no-network --no-external \
            > "$RESULTS/candidate-policy.json" 2> "$RESULTS/candidate-policy.err"
          code=$?
          set -e
          printf '%s' "$code" > "$RESULTS/candidate-policy.exit"
          echo "exit=$code" >> "$GITHUB_OUTPUT"
          echo "Policy validation exit: $code"
          cat "$RESULTS/candidate-policy.json" || true
          cat "$RESULTS/candidate-policy.err" || true

      - name: Run trusted full project QC evidence
        id: qc
        env:
          JAR: ${{ steps.cli.outputs.jar }}
          PROJECT: ${{ steps.trusted.outputs.project }}
          ONTOLOGY_RELATIVE: ${{ steps.trusted.outputs.ontology_relative }}
          RESULTS: ${{ runner.temp }}/results
        run: |
          run_format() {
            format="$1"
            output="$2"
            set +e
            java -jar "$JAR" validate --project "$PROJECT" --format "$format" \
              --no-network --no-external > "$RESULTS/$output" 2> "$RESULTS/${output}.err"
            code=$?
            set -e
            printf '%s' "$code" > "$RESULTS/${output}.exit"
            echo "${format}_exit=$code" >> "$GITHUB_OUTPUT"
          }
          run_format json qc.json
          run_format junit qc.junit.xml
          run_format sarif qc.sarif
          binding=false
          if jq -e --arg ontology "$ONTOLOGY_RELATIVE" \
              '.scope == "project_qc" and .resolved_assets.root_artifact == [$ontology]' \
              "$RESULTS/qc.json" >/dev/null 2>&1; then
            binding=true
          fi
          echo "binding=$binding" >> "$GITHUB_OUTPUT"

      - name: Run trusted dry-run release evidence
        id: release
        if: ${{ inputs.release_check }}
        env:
          JAR: ${{ steps.cli.outputs.jar }}
          PROJECT: ${{ steps.trusted.outputs.project }}
          RESULTS: ${{ runner.temp }}/results
        run: |
          set +e
          java -jar "$JAR" release --project "$PROJECT" --dry-run --no-network --no-external \
            > "$RESULTS/release.json" 2> "$RESULTS/release.err"
          code=$?
          set -e
          printf '%s' "$code" > "$RESULTS/release.exit"
          echo "exit=$code" >> "$GITHUB_OUTPUT"
          echo "Release preview exit: $code"

      # ASSERTED-DIFF GATE / REPORT. Report-only by default (exit 0); --check makes it an identity
      # gate. Exit 3 (a document that could not be loaded) always fails. A missing baseline file
      # (new ontology) is recorded, not failed.
      - name: Asserted semantic diff against the baseline
        id: diff
        env:
          JAR: ${{ steps.cli.outputs.jar }}
          LEFT: ${{ github.workspace }}/__baseline__/${{ inputs.ontology }}
          RIGHT: ${{ github.workspace }}/__candidate__/${{ inputs.ontology }}
          CHECK: ${{ inputs.diff_check }}
          RESULTS: ${{ runner.temp }}/results
        run: |
          mkdir -p "$RESULTS"
          if [ ! -f "$LEFT" ]; then
            printf '%s' "baseline-absent" > "$RESULTS/diff.status"
            echo "No baseline ontology at $LEFT (new file); skipping the asserted diff."
            exit 0
          fi
          args=(diff --left "$LEFT" --right "$RIGHT" --no-network)
          if [ "$CHECK" = "true" ]; then args+=(--check); fi
          set +e
          java -jar "$JAR" "${args[@]}" > "$RESULTS/diff.json" 2> "$RESULTS/diff.err"
          code=$?
          set -e
          printf '%s' "$code" > "$RESULTS/diff.exit"
          echo "exit=$code" >> "$GITHUB_OUTPUT"
          echo "Diff exit: $code"

      # Provenance + integrity manifest. The trusted annotator independently authenticates the run
      # and unchanged caller workflow through GitHub's API before checking these values and bytes.
      - name: Assemble result metadata
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CLI_VERSION: ${{ inputs.cli_version }}
          PROJECT: ${{ inputs.project }}
          ONTOLOGY: ${{ inputs.ontology }}
          ONTOLOGY_RELATIVE: ${{ steps.trusted.outputs.ontology_relative }}
          DIFF_CHECK: ${{ inputs.diff_check }}
          RELEASE_CHECK: ${{ inputs.release_check }}
          WORKFLOW: ${{ github.workflow }}
          RESULTS: ${{ runner.temp }}/results
        run: |
          mkdir -p "$RESULTS"
          cd "$RESULTS"
          printf '%s' "${PR_NUMBER:-}" > pr-number.txt
          jq -n \
            --arg run_id "$RUN_ID" \
            --arg run_attempt "$RUN_ATTEMPT" \
            --arg workflow "$WORKFLOW" \
            --arg head_sha "$HEAD_SHA" \
            --arg base_sha "$BASE_SHA" \
            --arg cli_version "$CLI_VERSION" \
            --arg project "$PROJECT" \
            --arg ontology "$ONTOLOGY" \
            --arg ontology_relative "$ONTOLOGY_RELATIVE" \
            --argjson diff_check "$DIFF_CHECK" \
            --argjson release_check "$RELEASE_CHECK" \
            '{producer_run_id:$run_id, producer_run_attempt:$run_attempt, producer_workflow:$workflow, head_sha:$head_sha, base_sha:$base_sha, cli_version:$cli_version, project:$project, ontology:$ontology, ontology_relative:$ontology_relative, diff_check:$diff_check, release_check:$release_check, scope:"candidate_policy+trusted_project_qc+asserted_diff+release_preview"}' \
            > meta.json
          # Bare-basename checksums; the annotator parses this strict list and hashes each allowed
          # file itself, never passing an artifact-supplied path to sha256sum.
          # Write via a temp file outside this directory so find never enumerates the file being
          # written (avoids a read/write-same-file pipeline).
          find . -maxdepth 1 -type f ! -name manifest.sha256 -printf '%P\0' \
            | sort -z | xargs -0 sha256sum > "$RUNNER_TEMP/manifest.sha256"
          mv "$RUNNER_TEMP/manifest.sha256" manifest.sha256

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ runner.temp }}/results/
          if-no-files-found: error

      # The untrusted job's own conclusion IS the PR check status for the gate. Fail after uploading
      # so the annotator can still report the failure. Diff exit 1 only occurs under --check.
      - name: Enforce the gate
        env:
          POLICY_EXIT: ${{ steps.policy.outputs.exit }}
          QC_JSON_EXIT: ${{ steps.qc.outputs.json_exit }}
          QC_JUNIT_EXIT: ${{ steps.qc.outputs.junit_exit }}
          QC_SARIF_EXIT: ${{ steps.qc.outputs.sarif_exit }}
          QC_BINDING: ${{ steps.qc.outputs.binding }}
          RELEASE_CHECK: ${{ inputs.release_check }}
          RELEASE_EXIT: ${{ steps.release.outputs.exit }}
          DIFF_EXIT: ${{ steps.diff.outputs.exit }}
        run: |
          fail=0
          if [ "${POLICY_EXIT:-2}" != "0" ]; then
            echo "::error::Candidate policy validation failed (exit ${POLICY_EXIT:-2})."
            fail=1
          fi
          for result in "$QC_JSON_EXIT" "$QC_JUNIT_EXIT" "$QC_SARIF_EXIT"; do
            if [ "${result:-3}" != "0" ]; then
              echo "::error::Trusted full-QC evidence failed (exit ${result:-3})."
              fail=1
            fi
          done
          if [ "$QC_BINDING" != "true" ]; then
            echo "::error::Trusted policy root artifact does not match the configured candidate ontology."
            fail=1
          fi
          if [ "$RELEASE_CHECK" = "true" ] && [ "${RELEASE_EXIT:-3}" != "0" ]; then
            echo "::error::Trusted release preview failed (exit ${RELEASE_EXIT:-3})."
            fail=1
          fi
          # Exhaustive and fail-closed: ANY non-zero diff exit fails the gate (never fall through open).
          if [ -n "${DIFF_EXIT:-}" ] && [ "$DIFF_EXIT" != "0" ]; then
            case "$DIFF_EXIT" in
              1) echo "::error::Asserted-diff identity gate failed (ontologies differ)." ;;
              2) echo "::error::Asserted diff hit a configuration/usage error (exit 2)." ;;
              3) echo "::error::A diff input could not be loaded (exit 3)." ;;
              *) echo "::error::Asserted diff failed (exit ${DIFF_EXIT})." ;;
            esac
            fail=1
          fi
          exit "$fail"
