name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v0.3.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Verify tag matches Maven version
        id: project
        run: |
          project_version="$(python3 - <<'PY'
          import xml.etree.ElementTree as ET

          root = ET.parse("pom.xml").getroot()
          ns = {"m": "http://maven.apache.org/POM/4.0.0"}
          print(root.findtext("m:version", namespaces=ns))
          PY
          )"
          expected_tag="v${project_version}"
          actual_tag="${{ steps.release_tag.outputs.tag }}"

          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "Release tag '$actual_tag' does not match Maven version '$project_version' (expected '$expected_tag')." >&2
            exit 1
          fi

          asset="target/protege-mcp-${project_version}.jar"
          echo "version=${project_version}" >> "$GITHUB_OUTPUT"
          echo "asset=${asset}" >> "$GITHUB_OUTPUT"

      - name: Build, test, and enforce coverage
        run: mvn -B clean verify

      - name: Build release notes from CHANGELOG.md
        id: notes
        env:
          VERSION: ${{ steps.project.outputs.version }}
        run: |
          # Extract this version's "## [x.y.z]" section (up to the next "## [" header) as the release body.
          awk -v hdr="## [$VERSION]" \
            'index($0, hdr) == 1 { f = 1; next } f && index($0, "## [") == 1 { f = 0 } f { print }' \
            CHANGELOG.md > RELEASE_NOTES.md
          if grep -q '[^[:space:]]' RELEASE_NOTES.md; then
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
            echo "Using CHANGELOG.md section for $VERSION:"
            cat RELEASE_NOTES.md
          else
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
            echo "No CHANGELOG.md section for $VERSION; falling back to auto-generated notes."
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release_tag.outputs.tag }}
          ASSET: ${{ steps.project.outputs.asset }}
          HAVE_NOTES: ${{ steps.notes.outputs.have_notes }}
        run: |
          test -f "$ASSET"
          if [ "$HAVE_NOTES" = "true" ]; then
            gh release create "$TAG" "$ASSET" --title "protege-mcp $TAG" --notes-file RELEASE_NOTES.md
          else
            gh release create "$TAG" "$ASSET" --title "protege-mcp $TAG" --generate-notes
          fi
