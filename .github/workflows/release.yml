name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v0.3.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release_tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag '$tag' is not a valid version tag." >&2
            exit 1
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: Check version consistency
        # Old tags predate this gate and do not contain the script. Keep manual
        # republishing of those releases possible; every new tag is checked.
        run: |
          if [ -f scripts/check-version-consistency.sh ]; then
            bash scripts/check-version-consistency.sh
          else
            echo "No version-consistency gate in this legacy tag; skipping."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Verify tag matches Maven version
        id: project
        env:
          ACTUAL_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          project_version="$(python3 - <<'PY'
          import xml.etree.ElementTree as ET

          root = ET.parse("pom.xml").getroot()
          ns = {"m": "http://maven.apache.org/POM/4.0.0"}
          print(root.findtext("m:version", namespaces=ns))
          PY
          )"
          expected_tag="v${project_version}"
          actual_tag="$ACTUAL_TAG"

          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "Release tag '$actual_tag' does not match Maven version '$project_version' (expected '$expected_tag')." >&2
            exit 1
          fi

          # Tags v0.1.0 through v0.3.2 predate CHANGELOG.md entirely; keep them republishable.
          if [ ! -f CHANGELOG.md ]; then
            echo "No CHANGELOG.md in this legacy tag; skipping the finalized-heading gate."
          elif ! grep -Eq "^## \\[${project_version}\\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md; then
            echo "CHANGELOG.md must finalize ${project_version} from Unreleased to a YYYY-MM-DD date before tagging." >&2
            exit 1
          fi

          cli_asset="cli/target/protege-mcp-cli-${project_version}-all.jar"
          echo "version=${project_version}" >> "$GITHUB_OUTPUT"
          echo "cli_asset=${cli_asset}" >> "$GITHUB_OUTPUT"

      - name: Build, test, and enforce coverage
        run: mvn -B clean verify

      - name: Locate plugin release asset
        id: assets
        env:
          VERSION: ${{ steps.project.outputs.version }}
        run: |
          # Legacy tags (v0.1.0 through v0.5.1) predate the reactor split and build the plugin
          # jar at the repository root target/. A workflow_dispatch republish of such a tag runs
          # THIS workflow file (dispatch uses the selected branch's workflow, not the tag's), so
          # fall back to the legacy path when the modern one is absent.
          asset="plugin/target/protege-mcp-${VERSION}.jar"
          if [ ! -f "$asset" ] && [ -f "target/protege-mcp-${VERSION}.jar" ]; then
            asset="target/protege-mcp-${VERSION}.jar"
          fi
          test -f "$asset"
          echo "asset=${asset}" >> "$GITHUB_OUTPUT"

      - name: Verify standalone CLI and prepare checksums/notices
        env:
          VERSION: ${{ steps.project.outputs.version }}
          PLUGIN_ASSET: ${{ steps.assets.outputs.asset }}
          CLI_ASSET: ${{ steps.project.outputs.cli_asset }}
        run: |
          test -f "$PLUGIN_ASSET"
          # Checksums must verify with `sha256sum -c` after download, so record the bare basename
          # rather than the CI-workspace-relative path.
          ( cd "$(dirname "$PLUGIN_ASSET")" && sha256sum "$(basename "$PLUGIN_ASSET")" ) \
            > "${PLUGIN_ASSET}.sha256"
          # The cli module and THIRD_PARTY_NOTICES.md were introduced in 0.6.0. Legacy tags (v0.1.0
          # through v0.5.1) can still be manually republished via workflow_dispatch, so treat the CLI
          # artifact and notices as present-only, not hard requirements.
          if [ -f "$CLI_ASSET" ]; then
            if jar tf "$CLI_ASSET" | grep -q '^org/protege/'; then
              echo "Standalone CLI unexpectedly contains Protégé editor classes." >&2
              exit 1
            fi
            work="$(mktemp -d)"
            (cd "$work" && java -jar "$GITHUB_WORKSPACE/$CLI_ASSET" --version)
            ( cd "$(dirname "$CLI_ASSET")" && sha256sum "$(basename "$CLI_ASSET")" ) \
              > "${CLI_ASSET}.sha256"
          else
            echo "No CLI artifact in this (legacy) tag; skipping the standalone CLI checks."
          fi
          cp LICENSE "protege-mcp-${VERSION}-LICENSE.txt"

      - name: Build release notes from CHANGELOG.md
        id: notes
        env:
          VERSION: ${{ steps.project.outputs.version }}
        run: |
          # Extract this version's "## [x.y.z]" section (up to the next "## [" header) as the release
          # body. Legacy tags v0.1.0-v0.3.2 have no CHANGELOG.md at all; fall through to have_notes=false
          # there so they republish with auto-generated notes.
          if [ -f CHANGELOG.md ]; then
            awk -v hdr="## [$VERSION]" \
              'index($0, hdr) == 1 { f = 1; next } f && index($0, "## [") == 1 { f = 0 } f { print }' \
              CHANGELOG.md > RELEASE_NOTES.md
          else
            : > RELEASE_NOTES.md
          fi
          if grep -q '[^[:space:]]' RELEASE_NOTES.md; then
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
            echo "Using CHANGELOG.md section for $VERSION:"
            cat RELEASE_NOTES.md
          else
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
            echo "No CHANGELOG.md section for $VERSION; falling back to auto-generated notes."
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release_tag.outputs.tag }}
          ASSET: ${{ steps.assets.outputs.asset }}
          CLI_ASSET: ${{ steps.project.outputs.cli_asset }}
          VERSION: ${{ steps.project.outputs.version }}
          HAVE_NOTES: ${{ steps.notes.outputs.have_notes }}
        run: |
          test -f "$ASSET"
          # Assemble the asset list. The CLI artifact and THIRD_PARTY_NOTICES.md are 0.6.0+ additions;
          # a legacy-tag republish has neither, so include each only when present.
          assets=("$ASSET" "${ASSET}.sha256" "protege-mcp-${VERSION}-LICENSE.txt")
          if [ -f "$CLI_ASSET" ]; then
            assets+=("$CLI_ASSET" "${CLI_ASSET}.sha256")
          fi
          if [ -f THIRD_PARTY_NOTICES.md ]; then
            assets+=(THIRD_PARTY_NOTICES.md)
          fi
          # Re-cut friendly: a moved tag re-triggers this workflow when a release for $TAG may already
          # exist. Delete the existing release first (a no-op on a first release) so `gh release create`
          # always runs fresh and succeeds instead of failing with "release already exists". The git tag
          # itself is preserved (no --cleanup-tag), and the asset is rebuilt from the tagged commit above.
          gh release delete "$TAG" --yes 2>/dev/null || true
          if [ "$HAVE_NOTES" = "true" ]; then
            gh release create "$TAG" "${assets[@]}" --title "protege-mcp $TAG" --notes-file RELEASE_NOTES.md
          else
            gh release create "$TAG" "${assets[@]}" --title "protege-mcp $TAG" --generate-notes
          fi

          echo "Release asset published. Now update update.properties on develop, run scripts/check-version-consistency.sh --require-registry-current, and only then advance main (whose CI enforces the strict registry gate)."
