name: Live Protégé integration

on:
  schedule:
    - cron: '41 7 * * 3'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build the release bundle
        run: mvn -B -pl plugin -am -DskipTests package

      - name: Install virtual display
        run: |
          sudo apt-get update
          sudo apt-get install --yes xvfb

      - name: Exercise the real Protégé runtime
        run: xvfb-run --auto-servernum bash scripts/live-integration/run.sh

      - name: Upload live-runtime evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: live-protege-integration
          path: plugin/target/live-integration/
          if-no-files-found: warn
