name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check version consistency
        # Two-phase release: develop may legitimately lag the plugin registry while a release is
        # in flight, but main must always advertise the current released version, so the strict
        # registry gate runs whenever main is the pushed branch or the pull-request target.
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ] || [ "${GITHUB_BASE_REF}" = "main" ]; then
            bash scripts/check-version-consistency.sh --require-registry-current
          else
            bash scripts/check-version-consistency.sh
          fi

      - name: Verify advertised release asset exists
        run: bash scripts/check-advertised-release.sh

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build, test, and enforce coverage
        run: mvn -B clean verify

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: plugin/target/site/jacoco/
          if-no-files-found: ignore
