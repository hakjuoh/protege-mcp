version: 2
updates:
  # Most Maven dependencies here are deliberately PINNED and must not be auto-bumped:
  #   - owlapi + HermiT track the Protégé 5.6 runtime (OWLAPI 4.5.x, guava 18, slf4j 1.7);
  #   - jackson / reactor / json-schema-validator / snakeyaml are pinned to the MCP 2.0.0 resolved tree;
  #   - jetty 12 / jakarta.servlet 6.1 are the embedded Jakarta-EE10 servlet host;
  #   - jena is embedded at 4.x (the SPARQL tools + the merged JenaSubsystemLifecycle target 4.x ARQ);
  #   - titanium-rdfc 2.x is the last Java-17-compatible line; 3.x requires Java 21;
  #   - maven-bundle-plugin generates the load-bearing OSGi manifest.
  # A version bump for any of these breaks compilation, the bundle, or the Protégé runtime, so they are
  # ignored here. GitHub's Dependabot ALERTS still surface CVEs for them (visibility is unaffected); bump
  # them by hand, with a full build + live-Protégé check, when the runtime they track moves. Only the free
  # test/build tooling (junit, jacoco, surefire, compiler, enforcer, shade) is left to Dependabot.
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "net.sourceforge.owlapi:*"
      # guava is `provided`-scope: supplied at runtime by Protégé's own guava 18.0.0 bundle and
      # pinned by Import-Package [18.0,19); it is NOT embedded in the released JAR. The open CVE
      # alerts against guava 18 (CVE-2023-2976 / CVE-2020-8908 temp-dir perms; CVE-2018-10237
      # deserialization DoS) were triaged and dismissed as "vulnerable code not used": the plugin
      # never calls the affected APIs (Files.createTempDir / FileBackedOutputStream / AtomicDoubleArray)
      # and performs no Java deserialization, and it cannot change the runtime guava regardless. See
      # SECURITY.md "Third-party dependency CVEs" for the full rationale. Re-triage the same way if
      # a new guava-18 alert reopens; the real fix belongs upstream in Protégé Desktop.
      - dependency-name: "com.google.guava:guava"
      - dependency-name: "org.slf4j:*"
      - dependency-name: "io.modelcontextprotocol.sdk:*"
      - dependency-name: "com.fasterxml.jackson*"
      - dependency-name: "io.projectreactor:*"
      - dependency-name: "com.networknt:json-schema-validator"
      - dependency-name: "org.eclipse.jetty*"
      - dependency-name: "jakarta.servlet:*"
      - dependency-name: "org.apache.jena:*"
      # Titanium is embedded into both distributable artifacts. Selecting 3.x only when Maven runs
      # on JDK 21 would make their bytecode/runtime contract depend on the build machine, while the
      # project and Protégé integration intentionally remain compatible with Java 17.
      - dependency-name: "com.apicatalog:titanium-rdfc"
        versions: ["[3.0.0,)"]
      - dependency-name: "org.apache.felix:maven-bundle-plugin"

  # GitHub Actions are safe to keep current; group them into a single PR to keep the noise down.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
