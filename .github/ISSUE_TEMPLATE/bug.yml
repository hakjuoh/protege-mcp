name: Bug report
description: Something in the plugin behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Security:** do NOT file a public issue for a vulnerability. Use
        [Report a vulnerability](https://github.com/hakjuoh/protege-mcp/security/advisories/new)
        instead (see SECURITY.md).
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Pick the impact level — it is applied as a severity:* label automatically.
      options:
        - "severity:critical — Blocks default flow / data loss / prod-breaking"
        - "severity:high — Degrades a default flow; >3x repeat or >50% failure"
        - "severity:medium — Friction in a working flow; weekly+ exposure"
        - "severity:low — Cosmetic / cleanup / nice-to-have"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open ...
        2. Call tool ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - protege-mcp version:
        - Protégé version:
        - OS and how Protégé was launched (Dock/Finder, terminal, ...):
        - Java version (`java -version`):
        - MCP client / CLI (Claude Code, Codex, VS Code, ...) and its version:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant lines from the Protégé log (or the MCP client), with any tokens/secrets redacted.
      render: text
    validations:
      required: false
