# Protégé plugin-update descriptor for protege-mcp.
#
# This is the "Path B" (self-hosted registry) metadata file. Protégé's
# File ▸ Check for plugins reads it via:
#   org.protege.editor.core.update.PluginInfoDocumentParser
# which loads it with java.util.Properties (so '#' / '!' start comments).
#
# Rules enforced by that parser / PluginRegistryImpl:
#   * 'id' MUST exactly equal the bundle's Bundle-SymbolicName (io.github.hakjuoh.protege-mcp).
#   * 'version' MUST be a valid OSGi version (major.minor.micro[.qualifier]).
#   * 'download' MUST be a URL that serves the plugin jar.
#   * If the plugin is already installed, it is offered ONLY when this 'version'
#     is strictly greater than the installed bundle version. Note OSGi orders an
#     empty qualifier BEFORE a non-empty one, so 0.1.0 < 0.1.0.SNAPSHOT: bump the
#     micro/minor (e.g. 0.1.1) to update over an installed dev/SNAPSHOT build, or
#     test in a Protégé that does not yet have the plugin installed.
#
# These URLs point at the official hakjuoh/protege-mcp GitHub distribution: 'download'
# is the jar attached to the v0.1.0 GitHub Release. 'readme' is a RAW URL to a small,
# self-contained HTML document (docs/readme.html). Protégé does NOT trust the server
# Content-Type (raw.githubusercontent.com serves everything as text/plain); instead it
# reads the body and sniffs it for the substring "<html" — if present it renders the
# readme as HTML in a Swing JEditorPane (HTML 3.2), otherwise as plain text. So a raw
# .html file renders formatted (exactly how Cellfie/OntoGraf do it). NEVER point 'readme'
# at a github.com '/blob/...' page: that returns the whole GitHub web-app HTML, which
# renders as garbage AND whose fetch blocks the EDT (the dialog appears to freeze).
# 'license' is opened in the external browser, so a '/blob/...' URL is fine there. If you
# fork, repoint these at your account and bump 'version' (see docs/check-for-plugins.md).

id=io.github.hakjuoh.protege-mcp
name=Protege MCP Server
version=0.3.3
download=https://github.com/hakjuoh/protege-mcp/releases/download/v0.3.3/protege-mcp-0.3.3.jar
readme=https://raw.githubusercontent.com/hakjuoh/protege-mcp/main/docs/readme.html
license=https://github.com/hakjuoh/protege-mcp/blob/main/LICENSE
author=Hakju Oh
