version: 1
project_id: cross-surface-v1
root_ontology: https://example.org/conformance
project_root: .

interoperability:
  profile: https://hakjuoh.github.io/protege-mcp/profiles/project-v1/
  additional_profiles: []
  root_artifact: ontology.ttl
  metadata:
    path: ro-crate-metadata.json
    format: ro-crate-1.1
  canonicalization:
    algorithm: RDFC-1.0
    hash: SHA-256
    scope: root-ontology
    timeout_ms: 120000

prefixes:
  ex: https://example.org/conformance#
  rdfs: http://www.w3.org/2000/01/rdf-schema#

network:
  default: deny

reasoning:
  reasoner: HermiT
  owl_profile: DL
  required: true
  timeout_ms: 30000

annotations:
  labels:
    properties: [rdfs:label]
    required_languages: [en]
    one_preferred_per_language: true

imports:
  mode: unlocked
  fail_on_missing: true
  network: deny

validation:
  required_stages: [interoperability, reasoner, profile, governance, structural]
  fail_on: error

release:
  format: turtle
  output_dir: dist
  require_version_iri: true
  require_clean_round_trip: true
