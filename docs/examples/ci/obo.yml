# Example CONSUMER workflow: gate an OBO / ROBOT-compatible ontology project on every pull request.
# Copy this to .github/workflows/ontology-ci.yml in YOUR ontology repository.
#
# Pairs with docs/examples/project-policy/obo.yaml (OBO IRIs, IAO definitions, HermiT with an EL profile). Like
# the general-OWL example it is the UNTRUSTED half — read-only, `pull_request` (never
# pull_request_target) — and calls the reusable validation workflow.
#
# The base policy must select the bundled HermiT baseline (it can still require the OWL 2 EL profile).
# This workflow runs the complete configured project QC and dry-run release offline. ROBOT may remain an
# additional OBO-specific check, but it is no longer a substitute for this gate.

name: Ontology CI

on:
  pull_request:

jobs:
  ontology-ci:
    permissions:
      contents: read
    # Pin by full commit SHA in production: v-tags in hakjuoh/protege-mcp are occasionally re-cut
    # (moved), so `@v0.7.2` is NOT an immutable reference.
    uses: hakjuoh/protege-mcp/.github/workflows/ontology-ci.yml@v0.7.2
    with:
      project: .protege-mcp/project.yaml
      # The OBO edit file (matches root_artifact in the paired obo.yaml policy).
      ontology: example-edit.owl
      cli_version: '0.7.2'
      release_check: true
      diff_check: false
