# Example CONSUMER workflow: gate a general OWL ontology project on every pull request.
# Copy this to .github/workflows/ontology-ci.yml in YOUR ontology repository.
#
# Pairs with docs/examples/project-policy/general-owl.yaml (modules, labels/definitions, IRI policy).
# This is the UNTRUSTED half: it runs on `pull_request` (never pull_request_target) so a fork PR gets
# a read-only token and no secrets. It calls the reusable validation workflow, which validates the
# candidate policy as a proposal, overlays the candidate root ontology onto the base branch's trusted
# project, runs full QC plus a dry-run release, and uploads JSON/JUnit/SARIF/checksum evidence. The
# trusted annotate.yml wrapper verifies the artifact as data and posts the PR result afterwards.

name: Ontology CI

on:
  pull_request:

jobs:
  ontology-ci:
    # Least privilege passed to the reusable workflow: read the repo, nothing else.
    permissions:
      contents: read
    # Pin by full commit SHA in production: v-tags in hakjuoh/protege-mcp are occasionally re-cut
    # (moved), so `@v0.7.2` is NOT an immutable reference. `@v0.7.2` is shown here for readability.
    uses: hakjuoh/protege-mcp/.github/workflows/ontology-ci.yml@v0.7.2
    with:
      project: .protege-mcp/project.yaml
      ontology: ontology.ttl
      cli_version: '0.7.2'
      release_check: true
      # Report-only diff (exit 0 on differences); the PR is expected to change the ontology.
      diff_check: false
